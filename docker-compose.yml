version: "3.9"

services:
  web:
    build:
      context: .
      target: dev
    container_name: tropigo-web-dev
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      # Optional Supabase envs for local dev
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    command: sh -lc "pnpm install && pnpm dev -p 3000"

  web-prod:
    build:
      context: .
    container_name: tropigo-web-prod
    ports:
      - "3000:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    profiles: ["prod"]

volumes:
  # Named volume for node_modules to avoid overwriting by bind mount in dev
  node_modules:
